<div class="modal-overlay" id="modalOverlay">
  <div class="modal-window">
    <div class="modal-header">
      <h3 class="modal-title">Оформление  заказа на консультацию</h3>
      <button class="modal-close" id="closeModalBtn">&times;</button>
    </div>

    <div class="modal-body">
      <form id="requestForm">
        <div class="form-group">
          <div class="input-wrapper">
            <img src="../public/images/icon-phone.svg" alt="Телефон" class="input-icon" />
            <input
              type="tel"
              id="userPhone"
              class="form-input"
              placeholder="Номер телефона"
              required
            />
            <img src="../public/images/icon-error.svg" alt="ошибка" class="error-icon" />
          </div>
        </div>
        <div class="form-group">
          <div class="input-wrapper">
            <input
              type="text"
              id="userName"
              class="form-input"
              placeholder="Ваше имя (или организация)"
              required
            />
            <img src="../public/images/icon-error.svg" alt="ошибка" class="error-icon" />
          </div>
        </div>
        <button type="submit" class="submit-btn">Оформить заявку</button>
      </form>
    </div>
  </div>
</div>

<script>
  Inputmask({ mask: "+7 (999) 999-99-99", placeholder: "_" }).mask("#userPhone");
</script>
